name: Release
on:
  # Releases are deliberate, to keep Actions minutes down: the 3-OS build
  # matrix runs only when a version tag (v*) is pushed or the workflow is run
  # manually — never automatically on every branch or commit.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  draft:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.build-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get last git tag
        id: tag
        run: echo "last-tag=$(git describe --tags --abbrev=0 || git rev-list --max-parents=0 ${{github.ref}})" >> "$GITHUB_OUTPUT"

      - name: Get version from current date
        id: version
        run: echo "build-version=$(node -e "try{console.log(require('./.electron-builder.config.js').extraMetadata.version)}catch(e){console.error(e);process.exit(1)}")" >> "$GITHUB_OUTPUT"

      - name: Waiting on All checks
        uses: lewagon/wait-on-check-action@v0.2
        with:
          ref: ${{ github.ref }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: 'draft'

      - name: Delete outdated drafts
        uses: hugo19941994/delete-draft-releases@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Draft
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        with:
          prerelease: true
          draft: true
          tag_name: v${{ steps.version.outputs.build-version }}
          name: v${{ steps.version.outputs.build-version }}

  upload_artifacts:
    needs: [draft]

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build
        env:
          VITE_APP_VERSION: ${{ needs.draft.outputs.version }}
          # Ship releases that load the UI from the GitHub Pages deployment, so
          # the web UI can be updated (via the Pages workflow) without a new
          # Electron build. The bundled renderer built here stays as the offline
          # fallback if Pages is unreachable. See packages/main/src/mainWindow.ts.
          VITE_RENDERER_URL: https://jdachtera.github.io/youtube-video-sequencer-electron/

      # Compile and publish the Electron app to the GitHub release.
      - name: Compile & release Electron app
        run: pnpm exec electron-builder --config .electron-builder.config.js --publish always
        env:
          VITE_APP_VERSION: ${{ needs.draft.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.github_token }}
