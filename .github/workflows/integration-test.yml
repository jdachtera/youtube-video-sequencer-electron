name: Integration test

# Run the headless audio + MIDI + scheduling integration harness
# (`pnpm integration-test`) on every push to a pull request. The harness builds
# the app with the engine exposed (VITE_EXPOSE_ENGINE -> window.__engine),
# launches it under Xvfb, injects a synthesized sine into the samplers and
# asserts on what comes out of the master bus — sound, pitch (octave ratio),
# automation curves, mocked Web MIDI, and the two scheduling crashes we fixed.
# It is fully offline: no network calls and no audio hardware, so it needs none
# of the sandbox network-policy domains.
#
# A PR is a deliberate request for review, so this runs on every push to the PR
# regardless of which files changed — the same reasoning as the Pages workflow.
# It does NOT run on every branch push, to keep Actions minutes down.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

# Cancel an in-flight run when new commits land on the same PR — only the latest
# commit needs verifying, which keeps Actions minutes down.
concurrency:
  group: integration-test-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Electron is Chromium under the hood, so Playwright's dependency installer
      # pulls the right shared libraries (it tracks the correct apt package names
      # per Ubuntu release, avoiding the libfoo / libfoo-t64 churn). Xvfb gives
      # the headless runner a display; the harness self-wraps in `xvfb-run`.
      # playwright-core is already a dependency (it drives Electron in the test).
      - name: Install Electron system libraries + Xvfb
        run: |
          pnpm exec playwright-core install-deps chromium
          sudo apt-get install -y xvfb

      - name: Run integration test
        run: pnpm integration-test
